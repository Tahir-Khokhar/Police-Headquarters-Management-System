<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Police Personnel Management</title>
    <style>
      :root {
        --bg: #0b1220;
        --card: rgba(255, 255, 255, 0.06);
        --card2: rgba(255, 255, 255, 0.09);
        --text: #e8eefc;
        --muted: rgba(232, 238, 252, 0.7);
        --accent: #4f8cff;
        --accent2: #2ce6a6;
        --danger: #ff5b6e;
        --warning: #ffb84d;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: radial-gradient(800px 500px at 20% 0%, rgba(79, 140, 255, 0.25), transparent),
          radial-gradient(700px 450px at 100% 10%, rgba(44, 230, 166, 0.18), transparent),
          var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-container {
        width: 100%;
        max-width: 420px;
        padding: 20px;
      }
      .login-card {
        background: var(--card);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 20px;
        padding: 40px 32px;
        backdrop-filter: blur(10px);
      }
      .login-header {
        text-align: center;
        margin-bottom: 32px;
      }
      .login-header h1 {
        font-size: 28px;
        font-weight: 800;
        margin-bottom: 8px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .login-header p {
        color: var(--muted);
        font-size: 14px;
      }
      .login-icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 20px;
        background: rgba(79, 140, 255, 0.15);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
      }
      .form-group {
        margin-bottom: 20px;
      }
      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 500;
        color: var(--muted);
      }
      .form-group input {
        width: 100%;
        padding: 14px 16px;
        background: var(--card2);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        color: var(--text);
        font-size: 15px;
        transition: all 0.2s ease;
      }
      .form-group input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(79, 140, 255, 0.15);
      }
      .form-group input::placeholder {
        color: var(--muted);
        opacity: 0.5;
      }
      .error-message {
        background: rgba(255, 91, 110, 0.15);
        border: 1px solid rgba(255, 91, 110, 0.3);
        color: var(--danger);
        padding: 12px 16px;
        border-radius: 10px;
        margin-bottom: 20px;
        font-size: 14px;
        text-align: center;
      }
      .btn-primary {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, var(--accent), #3a7de8);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 4px 15px rgba(79, 140, 255, 0.3);
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(79, 140, 255, 0.4);
      }
      .btn-primary:active {
        transform: translateY(0);
      }
      .login-footer {
        text-align: center;
        margin-top: 24px;
        padding-top: 24px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }
      .login-footer p {
        color: var(--muted);
        font-size: 14px;
      }
      .login-footer a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
        transition: color 0.2s ease;
      }
      .login-footer a:hover {
        color: var(--accent2);
      }
      .back-home {
        text-align: center;
        margin-top: 20px;
      }
      .back-home a {
        color: var(--muted);
        text-decoration: none;
        font-size: 13px;
        transition: color 0.2s ease;
      }
      .back-home a:hover {
        color: var(--text);
      }
      @media (max-width: 480px) {
        .login-card {
          padding: 32px 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <div class="login-icon">🛡️</div>
          <h1>Welcome Back</h1>
          <p>Sign in to Police Personnel Management System</p>
        </div>

        {% if form.errors %}
          <div class="error-message">
            Invalid username or password. Please try again.
          </div>
        {% endif %}

        <form method="post">
          {% csrf_token %}

          <div class="form-group">
            <label for="id_username">Username</label>
            <input 
              type="text" 
              name="username" 
              id="id_username" 
              placeholder="Enter your username"
              value="{{ form.username.value|default:'' }}" 
              autocomplete="username"
              required
            />
          </div>

          <div class="form-group">
            <label for="id_password">Password</label>
            <input 
              type="password" 
              name="password" 
              id="id_password" 
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            />
          </div>

          {% if next %}
            <input type="hidden" name="next" value="{{ next }}" />
          {% endif %}

          <button type="submit" class="btn-primary">Sign In</button>
        </form>

        <div class="login-footer">
          <p>Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
        </div>
      </div>

      <div class="back-home">
        <a href="{% url 'home' %}">← Back to Home</a>
      </div>
    </div>
  </body>
</html>
